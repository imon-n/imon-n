{% extends "base.html" %}

{% block content %}
<form method="post" class="w-50 m-auto">
  {% csrf_token %}
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter your Email" name="email">
    </div>

    <div class="mb-3">
      <label for="exampleInputName" class="form-label">Name</label>
      <input type="text" class="form-control" id="exampleInputName" aria-describedby="nameHelp" placeholder="Enter yor name" name="username">
    </div>

    <h1>{{name}}</h1>
    <h2><u>{{email}}</u></h2>

    <button type="submit" class="btn btn-primary"> Submit </button>
</form>
{% endblock content %}
