{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block content %}

<form method="post" style=" width: 50%; margin:auto;" enctype="multipart/form-data">
    {% csrf_token %}
    <h1 class="text-center mx-3">Django builtIn form</h1>
    {{form | crispy}}
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
{% endblock content %}
