{% extends "base.html" %}
{% load static %}

{% block content %}
    <div class="div1">
        {% for i in data %}
        <div class="card" style="width: 18rem;">
            <img class="card-img-top" src="{{i.strCategoryThumb}}" alt="Card image cap">
            <div class="card-body">
            <h2 class="card-title">{{i.strCategory}}</h2>

        <p>{{ i.strCategoryDescription |truncatewords:10 }}</p>
            </div>
        </div>
    {% endfor %}
    </div>
{% endblock content %}
